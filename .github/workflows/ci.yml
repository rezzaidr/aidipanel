name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-installer:
    name: Lint Bash Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck -S warning install.sh

      - name: Lint aidipanel CLI
        run: shellcheck -S warning aidipanel

      - name: Check bash syntax — install.sh
        run: bash -n install.sh

      - name: Check bash syntax — aidipanel
        run: bash -n aidipanel

  lint-php:
    name: Lint PHP Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: PHP syntax check (all files)
        run: find aidipanel-app -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" || true

  release:
    name: Create Release Archive
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint-installer, lint-php]
    steps:
      - uses: actions/checkout@v4

      - name: Package install script
        run: |
          cp install.sh install-aidipanel.sh
          tar -czf aidipanel-panel-app.tar.gz aidipanel-app/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aidipanel-dist
          path: |
            install-aidipanel.sh
            aidipanel
            aidipanel-panel-app.tar.gz
